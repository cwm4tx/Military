.ref-body{padding:0 16px 16px;font-size:13.5px;line-height:1.65;color:#333}
.ref-body p{margin-bottom:10px}
.ref-body .callout{background:#F0F7ED;border-left:4px solid #2D4A22;border-radius:0 8px 8px 0;padding:12px 14px;margin:12px 0;font-size:13px}
.ref-body .callout-title{font-weight:700;color:#2D4A22;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ref-body .warn{background:#FFF8F0;border-left-color:#E67E22}
.ref-body .warn .callout-title{color:#E67E22}
.ref-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.ref-body th{background:#2D4A22;color:#fff;padding:8px 10px;text-align:left;font-weight:600}
.ref-body td{padding:8px 10px;border-bottom:1px solid #eee}
.ref-body tr:nth-child(even) td{background:#f9f9f9}
.ref-body .sub{font-size:14px;font-weight:700;color:#3B5323;margin:14px 0 6px}

      close.onclick = function() {
        banner.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        banner.style.transform = 'translateY(-100%)';
        banner.style.opacity = '0';
        setTimeout(function() { banner.remove(); }, 300);
        localStorage.setItem('milnav-install-dismissed', '1');
        // Adjust body padding
        document.body.style.paddingTop = '0';
      };
      
      banner.appendChild(icon);
      banner.appendChild(text);
      banner.appendChild(close);
      document.body.prepend(banner);
      document.body.style.paddingTop = '68px';
    }, 1500); // Show after 1.5s so content loads first
  }
})();
</script>
</body>
</html>
